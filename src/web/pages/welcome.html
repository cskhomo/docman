<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <link rel="stylesheet" href="/web/styles/welcome.css">
    <script src="/web/scripts/redirect.js"></script>
    <script src="/web/scripts/welcome.js"></script>
</head>
<body>
    <div class="container">
        <div id="login_view">
            <h2>Sign In</h2>
            <form id="login_form" novalidate>
                <div class="field-group">
                    <div class="field-header">
                        <label for="login_email">Email</label>
                        <span class="field-error" id="login_email_error"></span>
                    </div>
                    <input type="text" id="login_email" placeholder="you@example.com">
                </div>
                <div class="field-group">
                    <div class="field-header">
                        <label for="login_password">Password</label>
                        <span class="field-error" id="login_password_error"></span>
                    </div>
                    <input type="password" id="login_password" placeholder="Enter password">
                </div>
                <button type="submit">Login</button>
            </form>
            <div class="form-error" id="login_form_error"></div>
            <div class="auth-switch">
                <span>Don't have an account?</span>
                <button class="link-button" id="show_signup_btn">Sign up</button>
            </div>
        </div>
        
        <div id="signup_view" hidden>
            <h2>Sign Up</h2>
            <form id="signup_form" novalidate>
                <div class="field-group">
                    <div class="field-header">
                        <label for="signup_email">Email</label>
                        <span class="field-error" id="signup_email_error"></span>
                    </div>
                    <input type="text" id="signup_email" placeholder="you@example.com">
                </div>
                <div class="field-group">
                    <div class="field-header">
                        <label for="signup_password">Password</label>
                        <span class="field-error" id="signup_password_error"></span>
                    </div>
                    <input type="password" id="signup_password" placeholder="Min 6 characters">
                </div>
                <button type="submit">Create Account</button>
            </form>
            <div class="form-error" id="signup_form_error"></div>
            <div class="auth-switch">
                <span>Already have an account?</span>
                <button class="link-button" id="show_login_btn">Login</button>
            </div>
        </div>
    </div>
</body>
</html>
