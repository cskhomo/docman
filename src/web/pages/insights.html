<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights</title>

    <link rel="stylesheet" href="/web/styles/insights.css">

    <script src="/web/scripts/redirect.js" defer></script>
    <script src="/web/scripts/insights.js" defer></script>
</head>

<body>

    <div class="topbar">
        <button class="nav_link" onclick="goto_dashboard()">Dashboard</button>
    </div>

    <div class="container">

        <div class="action_bar">

            <div class="action_left">
                <button onclick="goto_upload()">Upload Invoice</button>
                <button onclick="export_pdf()">Export PDF</button>
                <button onclick="export_excel()">Export Excel/CSV</button>
            </div>

            <div class="action_right">
                <button class="logout_button" onclick="logout()">Logout</button>
            </div>

        </div>

        <div class="table_container">
            <table class="summary_table">
                <tbody id="summary_body"></tbody>
            </table>
        </div>

        <div class="table_container">
            <table class="vendor_table">
                <thead>
                    <tr>
                        <th>Vendor</th>
                        <th>Spend</th>
                    </tr>
                </thead>
                <tbody id="vendor_body"></tbody>
            </table>
        </div>

        <div class="table_container">
            <table class="insight_table">
                <thead>
                    <tr>
                        <th>Source</th>
                        <th>Insight</th>
                    </tr>
                </thead>
                <tbody id="insight_body"></tbody>
            </table>
        </div>

    </div>

</body>
</html>
